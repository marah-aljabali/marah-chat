name: Weekly Database Update

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Database Builder
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # تأكدي من إضافة المفتاح في Settings of repo
        run: python build_db_app.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add university_db_app/ last_update.txt
          git diff --staged --quiet || git commit -m "🤖 Auto-update DB [Weekly]"
          git push
